# Optional local PostgreSQL for AgenticForce (dev only).
#
# Postgres only (default):
#   docker compose up -d
#   cp .env.example .env   # ensure DATABASE_URL matches POSTGRES_* below
#   npm run db:migrate:deploy
#
# Full stack — Next.js on the host (same machine as Compose):
#   docker compose --profile dev-server up -d --build
#   Open http://localhost:3000
#   Optional: put API keys in a root `.env` file; the dev-server service loads it when present.
#
# Stop: docker compose down
# Data persists in the named volume until you docker compose down -v

services:
  postgres:
    image: postgres:16-alpine
    container_name: agenticforce-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agenticforce
    volumes:
      - agenticforce_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agenticforce"]
      interval: 5s
      timeout: 5s
      retries: 5

  dev-server:
    profiles: ["dev-server"]
    build: .
    container_name: agenticforce-dev-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/agenticforce?schema=public
      STORAGE_ROOT: /data/storage
    env_file:
      - path: .env
        required: false
    volumes:
      - agenticforce_storage:/data/storage
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  agenticforce_pgdata:
  agenticforce_storage:
